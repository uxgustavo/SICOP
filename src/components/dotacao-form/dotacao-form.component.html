<form [formGroup]="dotacaoForm" (ngSubmit)="onSubmit()" class="flex flex-col h-full bg-white dark:bg-card-dark rounded-lg shadow-xl w-full max-w-lg mx-auto overflow-hidden">
  
  <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 bg-white dark:bg-card-dark flex items-center justify-between shrink-0">
    <h2 class="text-lg font-bold text-gray-900 dark:text-white">
      Nova Dotação
    </h2>
    <div class="flex items-center gap-2">
      <button type="button" (click)="onCancel()"
        class="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto space-y-5 p-6">
    
    <!-- Dotação e UG -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Código Dotação</label>
        <input 
          formControlName="dotacao" 
          type="text"
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-sco-blue outline-none dark:bg-gray-800 dark:border-gray-600 transition-shadow"
          [class.border-red-500]="f['dotacao'].invalid && f['dotacao'].touched"
          placeholder="Ex: 04.122.0001.2001.0000"
        >
        @if (f['dotacao'].invalid && f['dotacao'].touched) {
          <p class="text-xs text-red-500 mt-1 font-medium">Obrigatório.</p>
        }
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Unidade Gestora (UG)</label>
        <select 
          formControlName="unid_gestora"
          class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-sco-blue outline-none dark:bg-gray-800 dark:border-gray-600 cursor-pointer"
        >
          <option value="" disabled selected>Selecione a UG</option>
          <option value="UG Administração">UG Administração</option>
          <option value="UG Saúde">UG Saúde</option>
          <option value="UG Educação">UG Educação</option>
          <!-- Additional options as needed -->
        </select>
        @if (f['unid_gestora'].invalid && f['unid_gestora'].touched) {
          <p class="text-xs text-red-500 mt-1 font-medium">Selecione uma UG.</p>
        }
      </div>
    </div>

    <!-- Valor Dotação -->
    <div>
      <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Valor da Dotação (R$)</label>
      <input 
        formControlName="valor_dotacao" 
        type="number" step="0.01" min="0"
        class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-sco-blue outline-none dark:bg-gray-800 dark:border-gray-600 transition-shadow"
        [class.border-red-500]="f['valor_dotacao'].invalid && f['valor_dotacao'].touched"
        placeholder="0.00"
      >
      @if (f['valor_dotacao'].invalid && f['valor_dotacao'].touched) {
        <p class="text-xs text-red-500 mt-1 font-medium">Valor deve ser maior que zero.</p>
      }
    </div>

  </div>

  <!-- Footer Actions -->
  <div class="p-4 border-t border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 flex gap-3 shrink-0 rounded-b-lg">
    <button 
      type="button" 
      (click)="onCancel()"
      class="flex-1 px-4 py-2.5 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors outline-none"
    >
      Cancelar
    </button>
    <button 
      type="submit"
      class="flex-1 px-4 py-2.5 text-sm font-semibold text-white bg-sco-blue hover:bg-blue-700 rounded-lg transition-colors outline-none shadow-sm flex items-center justify-center gap-2"
    >
      <span class="material-symbols-outlined text-[18px]">add</span>
      Adicionar Dotação
    </button>
  </div>
</form>
